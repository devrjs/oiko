networks:
  traefik:
    external: true
  oiko:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BETTER_AUTH_SERVER_URL=${BETTER_AUTH_SERVER_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - BACKEND_API_PORT=${BACKEND_API_PORT}
    networks:
      - traefik
      - oiko
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.oiko.local`) || PathPrefix(`/api-proxy`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=${API_ROUTER_PRIORITY:-10}"
      - "traefik.http.middlewares.api-strip-prefix.stripprefix.prefixes=/api-proxy"
      - "traefik.http.routers.api.middlewares=api-strip-prefix,compress@file,security-headers@file"
      - "traefik.http.services.api.loadbalancer.server.port=3333"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=10s"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_API_URL=${NEXT_PUBLIC_BACKEND_API_URL}
        - INTERNAL_BACKEND_API_URL=${INTERNAL_BACKEND_API_URL}
    environment:
      - INTERNAL_BACKEND_API_URL=${INTERNAL_BACKEND_API_URL}
      - NEXT_PUBLIC_BACKEND_API_URL=${NEXT_PUBLIC_BACKEND_API_URL}
    networks:
      - traefik
      - oiko
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`app.oiko.local`) || PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=${WEB_ROUTER_PRIORITY:-5}"
      - "traefik.http.routers.web.middlewares=compress@file,security-headers@file"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.services.web.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.web.loadbalancer.healthcheck.interval=10s"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
