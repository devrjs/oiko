name: Deploy para Produção

on:
  push:
    branches: [master]

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar .env com as variáveis de produção
        run: |
          cat > ~/oiko.env << 'EOF'
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=oiko
          BACKEND_API_PORT=3333
          BETTER_AUTH_SERVER_URL=${{ secrets.BETTER_AUTH_SERVER_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_TRUSTED_ORIGINS=${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }}
          INTERNAL_BACKEND_API_URL=${{ secrets.INTERNAL_BACKEND_API_URL }}
          EOF

      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 192.168.0.233 >> ~/.ssh/known_hosts

          ssh root@192.168.0.233 "
            cd /opt/oiko 2>/dev/null || {
              git clone https://github.com/devrjs/oiko.git /opt/oiko
              cd /opt/oiko
            }
            cd /opt/oiko
            git fetch origin master
            git reset --hard origin/master
            cp ~/oiko.env .env
            docker compose up -d --build
          "

      - name: Rodar migrações (Drizzle Push)
        run: |
          ssh root@192.168.0.233 "
            cd /opt/oiko
            sleep 5
            docker compose exec -T api bun x drizzle-kit push --force --config drizzle.config.ts
          "

      - name: Verificar saúde da API
        run: |
          sleep 10
          ssh root@192.168.0.233 "curl --fail --retry 5 --retry-delay 5 http://localhost:3333/health" \
            || (ssh root@192.168.0.233 "docker compose -f /opt/oiko/docker-compose.yml logs api --tail=30" && exit 1)

      - name: Verificar saúde do Frontend
        run: |
          ssh root@192.168.0.233 "curl --fail --retry 5 --retry-delay 5 http://localhost:3000/" \
            || (ssh root@192.168.0.233 "docker compose -f /opt/oiko/docker-compose.yml logs web --tail=30" && exit 1)

      - name: Limpar dados do build antigo
        run: |
          ssh root@192.168.0.233 "docker system prune -f --filter until=24h"
