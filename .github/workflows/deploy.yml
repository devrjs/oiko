name: Deploy para Produção

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar .env com as variáveis de produção
        run: |
          cat > .env << 'EOF'
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=oiko
          BACKEND_API_PORT=3333
          BETTER_AUTH_SERVER_URL=${{ secrets.BETTER_AUTH_SERVER_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_TRUSTED_ORIGINS=${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }}
          INTERNAL_BACKEND_API_URL=${{ secrets.INTERNAL_BACKEND_API_URL }}
          EOF

      - name: Build e Deploy dos containers
        run: |
          docker compose up -d --build

      - name: Verificar saúde da API
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 http://localhost:3333/health \
            || (docker compose logs api --tail=30 && exit 1)

      - name: Verificar saúde do Frontend
        run: |
          curl --fail --retry 5 --retry-delay 5 http://localhost:3000/ \
            || (docker compose logs web --tail=30 && exit 1)

      - name: Limpar dados do build antigo
        run: |
          docker system prune -f --filter until=24h
